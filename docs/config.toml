baseURL = 'https://choria-io.github.io/machine-room/'
languageCode = 'en-us'
title = 'Choria Machine Room'
theme = "hugo-theme-relearn"
canonifyURLs = true

[outputs]
home = [ "html", "rss", "print", "markdown"]
section = [ "html", "rss", "print", "markdown"]
page = [ "html",  "print", "markdown"]

[author]
name = "Choria Project"

[params]
showVisitedLinks = false
disableLanguageSwitchingButton = true
disableInlineCopyToClipBoard = true
alwaysopen = false
collapsibleMenu = true
externalLinkTargetc= "_self"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[params.themeVariant]]
    auto = ['zen-light', 'ccm']
    identifier = 'zen-auto'
    name = 'Auto Theme'

[[params.themeVariant]]
    identifier = 'zen-light'
    name = 'Light'

[[params.themeVariant]]
    identifier = 'ccm'
    name = 'Dark'

[[menu.shortcuts]]
name = "<i class='fab fa-fw fa-github'></i> GitHub"
identifier = "ds"
url = "https://github.com/choria-io/machine-room"
weight = 10

[[menu.shortcuts]]
name = "<i class='far fa-save'></i> Download"
url = "https://github.com/choria-io/machine-room/releases"
weight = 11

[[menu.shortcuts]]
name = "<i class='far fa-comments'></i> Discussions"
url = "https://github.com/choria-io/machine-room/discussions"
weight = 12

[[menu.shortcuts]]
name = "<i class='far fa-life-ring'></i> Issues"
url = "https://github.com/choria-io/machine-room/issues"
weight = 13

[[menu.shortcuts]]
name = "<i class='fab fa-slack'></i> #choria"
url = "https://slack.puppet.com/"
weight = 14
